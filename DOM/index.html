<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BanjarScript + HTML</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 500px;
      margin: 60px auto;
      text-align: center;
    }
    .kotak {
      margin-top: 20px;
      padding: 20px;
      border: 2px solid #b83030;
      border-radius: 8px;
      font-size: 18px;
    }
    .kotak.aktif {
      background-color: #4caf50;
      color: white;
      border-color: #4caf50;
    }
    button {
      padding: 10px 24px;
      font-size: 16px;
      cursor: pointer;
      border: none;
      background-color: #2196f3;
      color: white;
      border-radius: 6px;
    }
    button:hover {
      background-color: #1976d2;
    }
    #pesan {
      margin-top: 12px;
      font-size: 14px;
      color: #555;
    }
  </style>
</head>
<body>
  <h1>Halo dari BanjarScript!</h1>
  <button id="btnKirim">Klik Aku</button>
  <div class="kotak" id="kotakUtama">Ini kotaknya</div>
  <p id="pesan"></p>

  <script src="coba.js"></script>
</body>
</html>
